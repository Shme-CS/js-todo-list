<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A modern, responsive to-do list application built with vanilla JavaScript">
    <title>To-Do List | Task Manager</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <header class="app-header">
            <h1>My To-Do List</h1>
            <p class="subtitle">Stay organized, stay productive</p>
        </header>

        <main class="app-main">
            <!-- Task Input Section -->
            <section class="task-input-section">
                <form id="taskForm" class="task-form">
                    <input 
                        type="text" 
                        id="taskInput" 
                        class="task-input" 
                        placeholder="What needs to be done?"
                        autocomplete="off"
                        required
                    >
                    <button type="submit" class="btn btn-add">Add Task</button>
                </form>
            </section>

            <!-- Task Stats Section -->
            <section class="task-stats">
                <div class="stat-item">
                    <span class="stat-label">Total</span>
                    <span class="stat-value" id="totalTasks">0</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Active</span>
                    <span class="stat-value" id="activeTasks">0</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Completed</span>
                    <span class="stat-value" id="completedTasks">0</span>
                </div>
            </section>

            <!-- Filter Buttons -->
            <section class="filter-section">
                <button class="filter-btn active" data-filter="all">All</button>
                <button class="filter-btn" data-filter="active">Active</button>
                <button class="filter-btn" data-filter="completed">Completed</button>
            </section>

            <!-- Task List -->
            <section class="task-list-section">
                <ul id="taskList" class="task-list"></ul>
                <div id="emptyState" class="empty-state">
                    <p>No tasks yet. Add one to get started!</p>
                </div>
            </section>
        </main>

        <footer class="app-footer">
            <p>&copy; 2024 To-Do List App | Built with Vanilla JavaScript</p>
        </footer>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
